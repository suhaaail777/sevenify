<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sevenify</title>
<link rel="icon" type="image/png" href="applogo.png"/>
<link rel="apple-touch-icon" href="applogo.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#121212;color:#fff;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* Layout */
.app{display:flex;flex:1;overflow:hidden;}

/* Sidebar */
.sidebar{width:220px;background:#000;display:flex;flex-direction:column;padding:20px 14px;gap:28px;flex-shrink:0;overflow-y:auto;height:100%;}
.logo{font-size:20px;font-weight:800;color:#1db954;}
.nav a{display:flex;align-items:center;gap:10px;color:#b3b3b3;text-decoration:none;font-size:13px;font-weight:600;padding:8px 0;transition:color .2s;}
.nav a:hover,.nav a.active{color:#fff;}
.nav a svg{width:20px;height:20px;fill:currentColor;flex-shrink:0;}
.playlist-section h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#b3b3b3;margin-bottom:10px;}
.playlist-section ul{list-style:none;}
.playlist-section li{font-size:13px;color:#b3b3b3;padding:5px 0;cursor:pointer;transition:color .2s;}
.playlist-section li:hover{color:#fff;}

/* Main */
.main{flex:1;overflow-y:auto;padding:24px 24px 120px;background:linear-gradient(180deg,#1a3a2a 0%,#121212 280px);}
.main::-webkit-scrollbar{width:5px;}
.main::-webkit-scrollbar-thumb{background:#444;border-radius:3px;}
.main h2{font-size:26px;font-weight:800;margin-bottom:20px;}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:24px;}
.search-bar input{flex:1;padding:11px 16px;border-radius:24px;border:none;background:#242424;color:#fff;font-size:14px;outline:none;min-width:0;}
.search-bar input:focus{outline:2px solid #1db954;background:#2a2a2a;}
.search-bar input::placeholder{color:#b3b3b3;}
.search-bar button{padding:11px 20px;border-radius:24px;border:none;background:#1db954;color:#000;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;}
.search-bar button:hover{background:#1ed760;}

.section-title{font-size:18px;font-weight:700;margin:20px 0 14px;}
.loading{color:#b3b3b3;font-size:13px;padding:16px 0;}

/* Spotify-style loading animation */
.spinner{display:flex;align-items:center;justify-content:center;gap:4px;height:40px;padding:16px 0;}
.spinner span{width:6px;height:24px;background:#1db954;border-radius:3px;animation:spike 1.2s ease-in-out infinite;}
.spinner span:nth-child(1){animation-delay:0s;}
.spinner span:nth-child(2){animation-delay:.2s;}
.spinner span:nth-child(3){animation-delay:.4s;}
@keyframes spike{0%,100%{transform:scaleY(0.3);opacity:0.4;}50%{transform:scaleY(1);opacity:1;}}

/* Full-screen loading screen */
.loading-screen{position:fixed;inset:0;background:#121212;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,visibility .5s;}
.loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.loading-screen .logo-large{font-size:48px;font-weight:800;color:#1db954;margin-bottom:40px;}
.loading-screen .spinner-large{display:flex;align-items:center;justify-content:center;gap:6px;}
.loading-screen .spinner-large span{width:8px;height:40px;background:#1db954;border-radius:4px;animation:spike-lg 1.2s ease-in-out infinite;}
.loading-screen .spinner-large span:nth-child(1){animation-delay:0s;}
.loading-screen .spinner-large span:nth-child(2){animation-delay:.2s;}
.loading-screen .spinner-large span:nth-child(3){animation-delay:.4s;}
@keyframes spike-lg{0%,100%{transform:scaleY(0.3);opacity:0.4;}50%{transform:scaleY(1);opacity:1;}}
.error-msg{color:#e74c3c;font-size:13px;padding:10px 0;}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
.card{background:#181818;border-radius:8px;padding:14px;cursor:pointer;transition:background .2s;position:relative;}
.card:hover{background:#282828;}
.card:hover .play-btn{opacity:1;transform:translateY(0);}
.card img{width:100%;aspect-ratio:1;border-radius:4px;object-fit:cover;margin-bottom:10px;}
.card-title{font-size:13px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-sub{font-size:11px;color:#b3b3b3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.play-btn{position:absolute;bottom:68px;right:14px;width:38px;height:38px;background:#1db954;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;box-shadow:0 6px 14px rgba(0,0,0,.5);}
.play-btn svg{width:16px;height:16px;fill:#000;margin-left:2px;}

/* YouTube mini player - sits just above player bar */
.yt-panel{display:none;position:fixed;bottom:81px;right:16px;width:160px;background:#181818;border-radius:10px;overflow:hidden;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.7);border:1px solid #333;}
.yt-panel.open{display:block;}
.yt-panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#111;}
.yt-title{font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;margin-right:8px;}
.yt-close{background:none;border:none;color:#b3b3b3;font-size:16px;cursor:pointer;line-height:1;padding:0;}
.yt-close:hover{color:#fff;}
.yt-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;}
.yt-wrap iframe{width:100%;height:100%;border:none;}

/* Player bar */
.player{position:fixed;bottom:0;left:0;right:0;height:80px;background:#181818;border-top:1px solid #282828;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 20px;gap:12px;z-index:100;}
.player-info{display:flex;align-items:center;gap:12px;min-width:0;}
.player-info img{width:52px;height:52px;border-radius:4px;object-fit:cover;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.5);}
.track-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-artist{font-size:11px;color:#b3b3b3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.heart-btn{background:none;border:none;cursor:pointer;color:#b3b3b3;padding:4px;flex-shrink:0;transition:color .2s;}
.heart-btn:hover,.heart-btn.liked{color:#1db954;}
.heart-btn svg{width:15px;height:15px;fill:currentColor;}

.player-controls{display:flex;flex-direction:column;align-items:center;gap:6px;}
.ctrl-btns{display:flex;align-items:center;gap:18px;}
.ctrl-btn{background:none;border:none;cursor:pointer;color:#b3b3b3;display:flex;align-items:center;transition:color .2s;}
.ctrl-btn:hover{color:#fff;}
.ctrl-btn svg{width:16px;height:16px;fill:currentColor;}
.ctrl-btn.active svg{fill:#1db954;}
.play-pause{width:34px;height:34px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:transform .1s;flex-shrink:0;}
.play-pause:hover{transform:scale(1.07);}
.play-pause svg{width:14px;height:14px;fill:#000;}

.progress-row{display:flex;align-items:center;gap:8px;width:100%;}
.progress-row span{font-size:10px;color:#b3b3b3;width:34px;text-align:center;flex-shrink:0;}
.slider{-webkit-appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer;background:linear-gradient(to right,#1db954 var(--val,0%),#535353 var(--val,0%));transition:height .1s;}
.slider:hover{height:5px;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer;opacity:0;transition:opacity .2s;}
.slider:hover::-webkit-slider-thumb{opacity:1;}
#progress{width:clamp(100px,28vw,380px);}

.player-right{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.player-right svg{width:15px;height:15px;fill:#b3b3b3;flex-shrink:0;}
#volume{width:80px;}

/* Bottom nav for mobile */
.bottom-nav{display:none;position:fixed;bottom:80px;left:0;right:0;background:#000;border-top:1px solid #222;padding:8px 0 4px;z-index:99;}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:3px;color:#b3b3b3;text-decoration:none;font-size:10px;font-weight:600;flex:1;}
.bottom-nav a svg{width:22px;height:22px;fill:currentColor;}
.bottom-nav a.active,.bottom-nav a:hover{color:#fff;}
.bottom-nav-inner{display:flex;justify-content:space-around;}

/* Responsive */
@media(max-width:640px){
  .sidebar{display:none;}
  .bottom-nav{display:block;}
  .main{padding:16px 14px 170px;}
  .main h2{font-size:20px;}
  .cards{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
  .player{height:70px;padding:0 10px;gap:8px;}
  .player-info img{width:42px;height:42px;}
  .player-right{display:none;}
  .progress-row{display:none;}
  #progress{width:100px;}
  .ctrl-btns{gap:10px;}
}
@media(max-width:400px){
  .cards{grid-template-columns:repeat(2,1fr);}
  .ctrl-btn:not(.main-ctrl){display:none;}
}
</style>
</head>

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAhBLrb5DfsFp56CCPANLLSSwzE0pSLaH8",

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let listeningHistory = [];

// Auth functions
window.loginWithGoogle = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    currentUser = result.user;
    await loadUserData();
    updateUserUI();
  } catch (error) {
    console.error('Login error:', error);
  }
};

window.logout = async () => {
  await signOut(auth);
  currentUser = null;
  likedSongs = [];
  listeningHistory = [];
  updateUserUI();
};

// Load user data from Firestore
async function loadUserData() {
  if (!currentUser) return;
  const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
  if (userDoc.exists()) {
    const data = userDoc.data();
    likedSongs = data.likedSongs || [];
    listeningHistory = data.listeningHistory || [];
    updateHeartButton();
  } else {
    // Create new user document
    await setDoc(doc(db, 'users', currentUser.uid), {
      likedSongs: [],
      listeningHistory: [],
      createdAt: serverTimestamp()
    });
  }
}

// Save liked songs to Firestore
async function saveLikedSongs() {
  if (!currentUser) {
    localStorage.setItem('likedSongs', JSON.stringify(likedSongs));
    return;
  }
  await updateDoc(doc(db, 'users', currentUser.uid), {
    likedSongs: likedSongs
  });
}

// Add to listening history
async function addToHistory(track) {
  if (!track) return;
  const historyItem = {
    ...track,
    playedAt: new Date().toISOString()
  };
  listeningHistory.unshift(historyItem);
  if (listeningHistory.length > 50) listeningHistory.pop();
  
  if (currentUser) {
    await updateDoc(doc(db, 'users', currentUser.uid), {
      listeningHistory: arrayUnion(historyItem)
    });
  } else {
    localStorage.setItem('listeningHistory', JSON.stringify(listeningHistory));
  }
}

// Load from localStorage if not logged in
function loadLocalData() {
  if (!currentUser) {
    likedSongs = JSON.parse(localStorage.getItem('likedSongs') || '[]');
    listeningHistory = JSON.parse(localStorage.getItem('listeningHistory') || '[]');
  }
}

// Update UI based on auth state
function updateUserUI() {
  const userEl = document.getElementById('user-section');
  if (currentUser) {
    userEl.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;">
        <img src="${currentUser.photoURL}" style="width:32px;height:32px;border-radius:50%;" />
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${currentUser.displayName}</div>
          <div style="font-size:10px;color:#b3b3b3;cursor:pointer;" onclick="logout()">Logout</div>
        </div>
      </div>
    `;
  } else {
    userEl.innerHTML = `
      <div style="padding:10px 0;">
        <button onclick="loginWithGoogle()" style="width:100%;padding:10px;border-radius:20px;border:none;background:#1db954;color:#000;font-weight:700;font-size:12px;cursor:pointer;">
          Sign in with Google
        </button>
      </div>
    `;
  }
}

// Listen for auth state changes
onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    loadUserData();
  } else {
    loadLocalData();
  }
  updateUserUI();
});

    {title:"Believer",channel:"Imagine Dragons",videoId:"7wtfhZwyrcc",thumb:"https://img.youtube.com/vi/7wtfhZwyrcc/mqdefault.jpg"},
    {title:"Thunder",channel:"Imagine Dragons",videoId:"fKopy74weus",thumb:"https://img.youtube.com/vi/fKopy74weus/mqdefault.jpg"},
    {title:"Natural",channel:"Imagine Dragons",videoId:"0I647GU3Jsc",thumb:"https://img.youtube.com/vi/0I647GU3Jsc/mqdefault.jpg"},
  ],
  "Late Night": [
    {title:"Someone Like You",channel:"Adele",videoId:"hLQl3WQQoQ0",thumb:"https://img.youtube.com/vi/hLQl3WQQoQ0/mqdefault.jpg"},
    {title:"Perfect",channel:"Ed Sheeran",videoId:"2Vv-BfVoq4g",thumb:"https://img.youtube.com/vi/2Vv-BfVoq4g/mqdefault.jpg"},
    {title:"All of Me",channel:"John Legend",videoId:"450p7goxZqg",thumb:"https://img.youtube.com/vi/450p7goxZqg/mqdefault.jpg"},
  ]
};

const queues = {featured};

// Greeting
const h = new Date().getHours();
document.getElementById('greeting').textContent = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';

function renderCards(id, items, qKey) {
  document.getElementById(id).innerHTML = items.map((t,i) => `
    <div class="card" onclick="selectTrack(${i},'${qKey}')">
      <img src="${t.thumb}" loading="lazy" alt="${t.title}"/>
      <div class="card-title">${t.title}</div>
      <div class="card-sub">${t.channel}</div>
      <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    </div>`).join('');
}
renderCards('featured', featured, 'featured');

async function selectTrack(i, qKey) {
  queue = qKey === 'liked' ? likedSongs : (qKey === 'playlists' ? currentPlaylist : queues[qKey]);
  qIdx = i;
  const t = queue[i];
  currentTrack = t;
  document.getElementById('player-title').textContent = t.title;
  document.getElementById('player-artist').textContent = t.channel;
  document.getElementById('player-img').src = t.thumb;
  document.getElementById('yt-modal-title').textContent = t.title;
  updateHeartButton();
  await addToHistory(t);
  openYT(t.videoId);
}

function openYT(videoId) {
  document.getElementById('yt-panel').classList.add('open');
  if (ytReady) {
    ytPlayer.loadVideoById(videoId);
  } else {
    pendingId = videoId;
  }
}

function closeYT() {
  document.getElementById('yt-panel').classList.remove('open');
  if (ytReady) ytPlayer.pauseVideo();
  setPlayIcon(false);
  clearInterval(progTimer);
}

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-player', {
    height: '100%', width: '100%',
    playerVars: { autoplay: 1, rel: 0, modestbranding: 1, playsinline: 1 },
    events: {
      onReady() {
        ytReady = true;
        ytPlayer.setVolume(80);
        if (pendingId) { ytPlayer.loadVideoById(pendingId); pendingId = null; }
      },
      onStateChange(e) {
        const playing = e.data === YT.PlayerState.PLAYING;
        setPlayIcon(playing);
        if (playing) startPoll();
        else clearInterval(progTimer);
        if (e.data === YT.PlayerState.ENDED) isRepeat ? ytPlayer.seekTo(0) : nextTrack();
      }
    }
  });
}

function setPlayIcon(playing) {
  document.getElementById('icon-play').style.display = playing ? 'none' : 'block';
  document.getElementById('icon-pause').style.display = playing ? 'block' : 'none';
}

function startPoll() {
  clearInterval(progTimer);
  progTimer = setInterval(() => {
    if (!ytReady) return;
    const cur = ytPlayer.getCurrentTime?.() || 0;
    const dur = ytPlayer.getDuration?.() || 0;
    if (!dur) return;
    const pct = (cur / dur) * 100;
    const el = document.getElementById('progress');
    el.value = pct;
    el.style.setProperty('--val', pct + '%');
    document.getElementById('cur-time').textContent = fmt(cur);
    document.getElementById('tot-time').textContent = fmt(dur);
  }, 500);
}

function fmt(s) { s=Math.floor(s); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function togglePlay() {
  if (!ytReady) return;
  // open panel if closed
  if (!document.getElementById('yt-panel').classList.contains('open')) {
    document.getElementById('yt-panel').classList.add('open');
  }
  const s = ytPlayer.getPlayerState();
  s === YT.PlayerState.PLAYING ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}

function seekTo(v) { if (ytReady && ytPlayer.getDuration?.()) ytPlayer.seekTo((v/100)*ytPlayer.getDuration(), true); }
function setVolume(v) {
  if (ytReady) ytPlayer.setVolume(v);
  document.getElementById('volume').style.setProperty('--val', v+'%');
}

function getCurrentQueueKey() {
  if (queue === likedSongs) return 'liked';
  if (queue === currentPlaylist) return 'playlists';
  return Object.keys(queues).find(k => queues[k] === queue) || 'featured';
}

async function nextTrack() {
  if (!queue.length) return;
  qIdx = isShuffle ? Math.floor(Math.random()*queue.length) : (qIdx+1)%queue.length;
  const t = queue[qIdx];
  currentTrack = t;
  await selectTrack(qIdx, getCurrentQueueKey());
}
async function prevTrack() {
  if (!queue.length) return;
  if (ytReady && ytPlayer.getCurrentTime?.() > 3) { ytPlayer.seekTo(0,true); return; }
  qIdx = (qIdx-1+queue.length)%queue.length;
  const t = queue[qIdx];
  currentTrack = t;
  await selectTrack(qIdx, getCurrentQueueKey());
}

function toggleShuffle() { isShuffle=!isShuffle; document.getElementById('shuffle-btn').classList.toggle('active',isShuffle); }
function toggleRepeat()  { isRepeat=!isRepeat;   document.getElementById('repeat-btn').classList.toggle('active',isRepeat); }

async function toggleLike() {
  if (!currentTrack) return;
  const idx = likedSongs.findIndex(s => s.videoId === currentTrack.videoId);
  if (idx === -1) {
    likedSongs.push(currentTrack);
  } else {
    likedSongs.splice(idx, 1);
  }
  await saveLikedSongs();
  updateHeartButton();
}

function updateHeartButton() {
  if (!currentTrack) {
    document.getElementById('heart-btn').classList.remove('liked');
    return;
  }
  const isLiked = likedSongs.some(s => s.videoId === currentTrack.videoId);
  document.getElementById('heart-btn').classList.toggle('liked', isLiked);
}

let currentPlaylist = [];
let currentPlaylistName = '';

function showLibrary(e) {
  e?.preventDefault();
  document.getElementById('greeting').textContent = 'Your Library';
  document.getElementById('search-bar').style.display = 'none';
  document.getElementById('search-status').innerHTML = '';
  document.getElementById('results-label').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('featured').innerHTML = '';
  
  // Render playlists as cards (including Listening History)
  const allPlaylists = { ...playlists, "Listening History": listeningHistory };
  const playlistCards = Object.keys(allPlaylists).map(name => `
    <div class="card" onclick="${name === 'Listening History' ? 'showHistory()' : `showPlaylist('${name}')`}">
      <div style="width:100%;aspect-ratio:1;border-radius:4px;background:linear-gradient(135deg,${name === 'Listening History' ? '#b91db9,#2a1a3a' : '#1db954,#1a3a2a'});display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:800;color:#fff;text-align:center;padding:20px;">${name[0]}</div>
      <div class="card-title">${name}</div>
      <div class="card-sub">${allPlaylists[name].length} songs</div>
      <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    </div>
  `).join('');
  
  document.getElementById('featured').innerHTML = `<div class="section-title">Your Library</div><div class="cards">${playlistCards}</div>`;
  setActiveNav('library');
}

function showHistory() {
  document.getElementById('greeting').textContent = 'Listening History';
  document.getElementById('search-bar').style.display = 'none';
  document.getElementById('search-status').innerHTML = '';
  document.getElementById('results-label').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  
  if (listeningHistory.length === 0) {
    document.getElementById('featured').innerHTML = `<div class="section-title">Listening History</div><p class="loading" style="padding:40px 0;">No songs played yet. Start listening to build your history!</p>`;
  } else {
    const historyItems = listeningHistory.map((t, i) => `
      <div class="card" onclick="playFromHistory(${i})">
        <img src="${t.thumb}" loading="lazy" alt="${t.title}"/>
        <div class="card-title">${t.title}</div>
        <div class="card-sub">${t.channel}</div>
        <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
    `).join('');
    document.getElementById('featured').innerHTML = `<div class="section-title">Listening History • ${listeningHistory.length} songs</div><div class="cards">${historyItems}</div>`;
  }
  setActiveNav('library');
}

async function playFromHistory(index) {
  if (listeningHistory[index]) {
    currentTrack = listeningHistory[index];
    document.getElementById('player-title').textContent = currentTrack.title;
    document.getElementById('player-artist').textContent = currentTrack.channel;
    document.getElementById('player-img').src = currentTrack.thumb;
    document.getElementById('yt-modal-title').textContent = currentTrack.title;
    updateHeartButton();
    openYT(currentTrack.videoId);
  }
}

function showPlaylist(name) {
  currentPlaylistName = name;
  currentPlaylist = playlists[name] || [];
  if (name === 'Liked Songs') currentPlaylist = likedSongs;
  
  document.getElementById('greeting').textContent = name;
  document.getElementById('search-bar').style.display = 'none';
  document.getElementById('search-status').innerHTML = '';
  document.getElementById('results-label').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  
  if (currentPlaylist.length === 0) {
    document.getElementById('featured').innerHTML = `<div class="section-title">${name}</div><p class="loading" style="padding:40px 0;">No songs yet. Add songs by clicking the heart icon while playing.</p>`;
  } else {
    renderCards('featured', currentPlaylist, 'playlists');
    document.querySelector('#featured').insertAdjacentHTML('afterbegin', `<div class="section-title">${name} • ${currentPlaylist.length} songs</div>`);
  }
  setActiveNav('library');
}

function setActiveNav(view) {
  document.querySelectorAll('.nav a, .bottom-nav a').forEach(a => a.classList.remove('active'));
  if (view === 'home') {
    document.querySelector('.nav a[onclick*="showHome"]').classList.add('active');
    document.querySelector('.bottom-nav a[onclick*="showHome"]').classList.add('active');
  } else if (view === 'search') {
    document.querySelector('.nav a[onclick*="focusSearch"]').classList.add('active');
    document.querySelector('.bottom-nav a[onclick*="focusSearch"]').classList.add('active');
  } else if (view === 'library') {
    document.querySelector('.nav a[onclick*="showLibrary"]').classList.add('active');
    document.querySelector('.bottom-nav a[onclick*="showLibrary"]').classList.add('active');
  }
}

async function searchSongs() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  document.getElementById('search-status').innerHTML = '<div class="spinner"><span></span><span></span><span></span></div>';
  document.getElementById('results-label').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoEmbeddable=true&maxResults=12&q=${encodeURIComponent(q+' song')}&key=${API_KEY}`;
    const data = await fetch(url).then(r=>r.json());
    if (data.error) { document.getElementById('search-status').innerHTML=`<p class="error-msg">❌ ${data.error.message}</p>`; return; }
    const items = data.items.map(it=>({
      title: it.snippet.title,
      channel: it.snippet.channelTitle,
      videoId: it.id.videoId,
      thumb: it.snippet.thumbnails.medium.url
    }));
    queues.search = items;
    document.getElementById('search-status').innerHTML = '';
    document.getElementById('results-label').style.display = 'block';
    renderCards('results', items, 'search');
    document.getElementById('results-label').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    document.getElementById('search-status').innerHTML = '<p class="error-msg">❌ Network error.</p>';
  }
}

function showHome(e) {
  e?.preventDefault();
  const h = new Date().getHours();
  document.getElementById('greeting').textContent = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  document.getElementById('search-bar').style.display = 'flex';
  document.getElementById('results').innerHTML = '';
  document.getElementById('results-label').style.display = 'none';
  document.getElementById('search-status').innerHTML = '';
  document.getElementById('search-input').value = '';
  document.getElementById('featured').innerHTML = '';
  renderCards('featured', featured, 'featured');
  setActiveNav('home');
}
function focusSearch(e) {
  e?.preventDefault();
  showHome(null);
  document.getElementById('search-input').focus();
  setActiveNav('search');
}

// Init sliders
document.getElementById('volume').style.setProperty('--val','80%');
document.getElementById('progress').style.setProperty('--val','0%');

// Hide loading screen after page load
window.addEventListener('load',()=>{
  setTimeout(()=>{
    document.getElementById('loading-screen').classList.add('hidden');
  },600);
});

// Failsafe: always hide loading screen after 3 seconds even if JS errors
setTimeout(()=>{
  document.getElementById('loading-screen')?.classList.add('hidden');
},3000);
</script>
